<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta atrás verano</title>

<link href="https://fonts.cdnfonts.com/css/din-alternate" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/black-sans" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  font-family:'DIN Alternate',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* 🌊 FONDO ANIMADO */
.background-image{
  position:absolute;
  width:110%;
  height:110%;
  background:url('IMG_1755.jpeg') center/cover no-repeat;
  opacity:0.8;
  animation:moveBg 20s ease-in-out infinite alternate;
}

@keyframes moveBg{
  0%{transform:scale(1) translate(0,0);}
  50%{transform:scale(1.05) translate(-10px,-10px);}
  100%{transform:scale(1.1) translate(10px,10px);}
}

/* 🎵 BOTÓN MÚSICA */
#music-button{
  position:absolute;
  top:30px;
  right:30px;
  padding:15px 30px;
  background:rgba(0,0,0,0.7);
  color:#00d4ff;
  border:none;
  border-radius:15px;
  cursor:pointer;
  z-index:2;
  font-size:1.5rem;
  transition:transform .3s;
}

#music-button:hover{
  transform:scale(1.1);
}

/* CAJA */
.wrapper{
  z-index:1;
  text-align:center;
  background:rgba(255,255,255,0.35);
  padding:25px;
  border-radius:15px;
  backdrop-filter:blur(6px);
}

.title{font-size:2.5rem;font-family:'Black Sans';}
.subtitle{font-size:1.5rem;font-family:'Black Sans';}

/* CONTADOR */
.container{
  display:flex;
  gap:20px;
  justify-content:center;
  margin:20px 0;
}

/* 💙 EFECTO VERANO (AZUL) */
.number{
    font-size:2.8rem;
  font-weight:bold;
  font-family:'Black Sans';
  animation:pulse 1.5s infinite;
  color:#00bfff;
  text-shadow:0 0 8px rgba(0,191,255,0.6);

  /* BORDE NEGRO */
  -webkit-text-stroke: 2px black;

  /* SOMBRA MÁS SUAVE */
  text-shadow:
    3px 3px 8px rgba(0,0,0,0.4);
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.12);}
}

.label{
  font-family:'Black Sans';
}

/* CLICK VERANO */
.summer{
  position:absolute;
  pointer-events:none;
  animation:fall linear forwards;
}

@keyframes fall{
  0%{transform:translateY(0) rotate(0);opacity:1;}
  100%{transform:translateY(120vh) rotate(360deg);opacity:0;}
}

/* FINAL */
.final{
  font-size:2.5rem;
  font-family:'Black Sans';
  color:#00bfff;
  animation:finalGlow 1s infinite alternate;
}

@keyframes finalGlow{
  from{text-shadow:0 0 10px #00bfff;}
  to{text-shadow:0 0 25px #0077ff;}
}
</style>
</head>

<body>

<div class="background-image"></div>

<button id="music-button">🎵 Pulsa para tener el flow</button>
<audio id="background-music" src="Pineapple-on-pizza.mp3" loop></audio>

<div class="wrapper">
  <h1 class="title" id="title">FALTAN:</h1>

  <div class="container" id="countdown">
    <div><div class="number" id="days">00</div><div class="label">días</div></div>
    <div><div class="number" id="hours">00</div><div class="label">horas</div></div>
    <div><div class="number" id="minutes">00</div><div class="label">minutos</div></div>
    <div><div class="number" id="seconds">00</div><div class="label">segundos</div></div>
  </div>

  <h2 class="subtitle" id="subtitle">PARA EL VERANO ☀️🏖️🍉</h2>
</div>

<script>
const end = new Date("2026-06-16T14:15:00").getTime();

/* CONTADOR */
const countdown = () => {
  const now = Date.now();
  const d = end - now;

  if(d <= 0){
    document.getElementById("countdown").innerHTML = "";
    document.getElementById("title").innerHTML = "";
    const sub = document.getElementById("subtitle");
    sub.innerHTML = "YA ES VERANO 🔥";
    sub.classList.add("final");
    return;
  }

  document.getElementById("days").innerText = String(Math.floor(d/86400000)).padStart(2,"0");
  document.getElementById("hours").innerText = String(Math.floor(d%86400000/3600000)).padStart(2,"0");
  document.getElementById("minutes").innerText = String(Math.floor(d%3600000/60000)).padStart(2,"0");
  document.getElementById("seconds").innerText = String(Math.floor(d%60000/1000)).padStart(2,"0");
};

setInterval(countdown,1000);
countdown();

/* CLICK EFECTO */
document.addEventListener("click",(e)=>{
  const emojis=["☀️","🌴","🍉","🏖️","🍦","😎"];

  for(let i=0;i<8;i++){
    const el=document.createElement("div");
    el.className="summer";
    el.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

    el.style.left=e.clientX+(Math.random()*80-40)+"px";
    el.style.top=e.clientY+"px";
    el.style.fontSize=(Math.random()*1.5+1)+"rem";
    el.style.animationDuration=(Math.random()*2+2)+"s";

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
});

/* 🎵 MÚSICA */
const music = document.getElementById("background-music");
const btn = document.getElementById("music-button");

btn.addEventListener("click",()=>{
  if(music.paused){
    music.play();
    btn.textContent="🔊 no lo pares 😎";
  }else{
    music.pause();
    btn.textContent="🎵 Pulsa para tener el flow";
  }
});
</script>

</body>
</html>
